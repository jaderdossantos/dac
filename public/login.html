<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

  <h2>Login</h2>

  <input id="login" class="form-control mb-2" placeholder="Login">
  <input id="senha" type="password" class="form-control mb-3" placeholder="Senha">

  <button class="btn btn-primary mb-2" onclick="logar()">Entrar</button>

  <br>

  <a href="/cadastro.html" class="btn btn-secondary">Cadastrar Usuário</a>

  <script>
    async function logar() {
      const login = document.getElementById('login').value;
      const senha = document.getElementById('senha').value;

      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login, senha })
      });

      if (res.ok) {
        window.location.href = '/home.html';
      } else {
        alert('Login inválido');
      }
    }
  </script>

</body>
</html>
