<!DOCTYPE html>
<html>
<head>
  <title>Cadastro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

  <h2>Cadastrar Usuário</h2>

  <input id="nome" class="form-control mb-2" placeholder="Nome">
  <input id="login" class="form-control mb-2" placeholder="Login">
  <input id="senha" type="password" class="form-control mb-3" placeholder="Senha">

  <button class="btn btn-success" onclick="cadastrar()">Cadastrar</button>

  <script>
    async function cadastrar() {
      const nome = document.getElementById('nome').value;
      const login = document.getElementById('login').value;
      const senha = document.getElementById('senha').value;

      const res = await fetch('/usuarios', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, login, senha })
      });

      if (res.ok) {
        alert('Usuário cadastrado com sucesso!');
        
        // 🔥 REDIRECIONA PRO LOGIN
        window.location.href = '/login.html';
      } else {
        alert('Erro ao cadastrar');
      }
    }
  </script>

</body>
</html>
