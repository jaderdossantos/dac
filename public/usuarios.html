<!DOCTYPE html>
<html>
<head>
  <title>Usuários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

  <h2>Usuários</h2>

  <!-- BOTÕES -->
  <a href="/home.html" class="btn btn-secondary mb-3">Voltar</a>
  <a href="/cadastro.html" class="btn btn-primary mb-3">Novo Usuário</a>

  <!-- TABELA -->
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Login</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>

  <script>
    async function carregar() {
      const res = await fetch('/usuarios');
      const data = await res.json();

      const tabela = document.getElementById('tabela');
      tabela.innerHTML = '';

      data.forEach(u => {
        tabela.innerHTML += `
          <tr>
            <td>${u.usuario_id}</td>
            <td>${u.nome}</td>
            <td>${u.login}</td>
          </tr>
        `;
      });
    }

    carregar();
  </script>

</body>
</html>
