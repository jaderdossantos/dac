<!DOCTYPE html>
<html>
<head>
  <title>Cadastro de Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

  <h2>Cadastrar Usuário</h2>

  <a href="/usuarios.html" class="btn btn-secondary mb-3">Voltar</a>

  <input id="nome" class="form-control mb-2" placeholder="Nome">
  <input id="login" class="form-control mb-2" placeholder="Login">
  <input id="senha" type="password" class="form-control mb-3" placeholder="Senha">

  <button class="btn btn-success" onclick="cadastrar()">Cadastrar</button>

  <script>
async function cadastrar() {
  const nome = document.getElementById('nome').value;
  const login = document.getElementById('login').value;
  const senha = document.getElementById('senha').value;

  if (!nome || !login || !senha) {
    alert('Preencha todos os campos!');
    return;
  }

  const res = await fetch('/usuarios', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nome, login, senha })
  });

  if (res.ok) {
    alert('Usuário cadastrado com sucesso!');
    window.location.href = '/usuarios.html';
  } else {
    const erro = await res.text();
    alert('Erro: ' + erro);
  }
}
</script>

</body>
</html>
